<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f5f7fb;
            font-family:Arial, sans-serif;
        }

        .sidebar{
            width:250px;
            min-height:100vh;
            background:#0d6efd;
        }

        .sidebar h3{
            color:#fff;
            padding:20px;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,.2);
        }

        .sidebar .nav-link{
            color:#fff;
            padding:14px 20px;
            transition:.3s;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active{
            background:#0b5ed7;
            border-left:5px solid #fff;
        }

        .topbar{
            background:#fff;
            padding:15px 25px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .stat-icon{
            font-size:40px;
            color:#0d6efd;
        }

        .welcome-card{
            background:linear-gradient(135deg,#0d6efd,#4f9dfd);
            color:white;
        }

        @media(max-width:768px){
            .sidebar{
                width:100%;
                min-height:auto;
            }
        }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>HRMS</h3>

        <nav class="nav flex-column">
            <a class="nav-link active" href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="#"><i class="bi bi-person-circle"></i> Employee Profile</a>
            <a class="nav-link" href="#"><i class="bi bi-calendar-check"></i> Attendance</a>
            <a class="nav-link" href="#"><i class="bi bi-airplane"></i> Leave Request</a>
            <a class="nav-link" href="#"><i class="bi bi-wallet2"></i> Payroll</a>
            <a class="nav-link" href="#"><i class="bi bi-gear"></i> Settings</a>
            <a class="nav-link text-warning" href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1">

        <!-- Topbar -->
        <div class="topbar d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Dashboard</h4>
            <button class="btn btn-primary">
                <i class="bi bi-person-circle"></i> Employee
            </button>
        </div>

        <div class="container-fluid mt-4">

            <!-- Welcome -->
            <div class="card welcome-card p-4 mb-4">
                <h3>Welcome Employee 👋</h3>
                <p class="mb-0">
                    Manage your attendance, leave requests, payroll and profile from one place.
                </p>
            </div>

            <!-- Cards -->
            <div class="row">

                <div class="col-md-4 mb-4">
                    <div class="card p-4 text-center">
                        <i class="bi bi-calendar-check stat-icon"></i>
                        <h5 class="mt-3">Attendance</h5>
                        <h2 class="text-success">Present</h2>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card p-4 text-center">
                        <i class="bi bi-airplane stat-icon"></i>
                        <h5 class="mt-3">Paid Leave</h5>
                        <h2 class="text-primary">10 Days</h2>
                    </div>
                </div>

                <div class="col-md-4 mb-4">
                    <div class="card p-4 text-center">
                        <i class="bi bi-heart-pulse stat-icon"></i>
                        <h5 class="mt-3">Sick Leave</h5>
                        <h2 class="text-danger">5 Days</h2>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
